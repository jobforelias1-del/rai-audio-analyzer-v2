name: CI

# The build spec requires the validation gate to run on every push. This
# workflow runs the unit suite and then the acceptance gate. With no
# ground-truth WAVs committed (they are gitignored), the gate runs its
# synthetic self-test and must exit 0; once the producer drops the real
# fixtures into validation/fixtures/, the same step runs the REAL gate.
on:
  push:
  pull_request:

jobs:
  test-and-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy librosa soundfile pyloudnorm pytest

      - name: Unit tests
        run: python -m pytest -q

      - name: Acceptance gate (synthetic self-test unless fixtures present)
        run: python -m validation

  # Phase 3 plan §3's ui-offscreen job (added at M3 close per review finding:
  # the entire tests/ui tree was importorskipping in CI, so shell/section/
  # store/tiebreak regressions were local-only). Runs the Qt suite headless.
  # The BYTE-identical gate comparison still only runs locally (fixtures are
  # private, gitignored audio) — this job covers the Qt/UI logic lane.
  ui-offscreen:
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Qt runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libopengl0 libxkbcommon0 libxkbcommon-x11-0 \
            libdbus-1-3 libfontconfig1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy librosa soundfile pyloudnorm pytest \
            pytest-qt PySide6-Essentials shiboken6 pyqtgraph sounddevice fonttools

      - name: UI suite (offscreen)
        run: python -m pytest tests/ui -q
